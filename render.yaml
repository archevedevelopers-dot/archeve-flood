# Render Blueprint — Archeve flood-hazard API (free tier).
# Flood rasters (Deltares coastal clips) are baked into the image — no boot download.
services:
  - type: web
    name: archeve-flood
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
